<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="CodeLearn is a browser-only coding learning platform for AI/ML and backend engineers."
    />
    <title>CodeLearn</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      ;(() => {
        const redirect = sessionStorage.getItem('codelearn.redirect')
        if (redirect) {
          sessionStorage.removeItem('codelearn.redirect')
          history.replaceState(null, '', redirect)
        }
      })()
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
